<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperatrânsito | Educação no trânsito</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <nav class="nav-menu">
            <ul class="nav-list">
                <li><a href="#inicio">Início</a></li>
                <li><a href="#conteudo">Conteúdos</a></li>
                <li><a href="https://www.planalto.gov.br/ccivil_03/leis/l9503compilado.htm">Código de Trânsito Brasileiro</a></li>
                <li><a href="#contato">Contatos</a></li>
            </ul>
        </nav>
    </header>

    <section id="inicio" class="hero">
        <div class="hero-content">
            <div class="hero-logo">
                <img src="./img/logo-2026.png" alt="Logo Imperatrânsito">
            </div>
            <h1>Educação para um Trânsito Seguro</h1>
            <p>Conhecimento que salva vidas e transforma caminhos.</p>
            <a href="./sobre.html"><button class="cta-button">Saiba Mais</button></a>
        </div>
    </section>

    <section id="conteudo" class="content-section">
        <div class="container">
            <h2 class="section-title">Conteúdo Exclusivo</h2>
            
            <!-- Os cards estáticos sumiram! O JavaScript vai injetar os posts do blog aqui dentro -->
            <div id="blog-cards-container" class="cards-grid">
                <p style="text-align: center; grid-column: 1/-1; color: #666;">Carregando matérias recentes...</p>
            </div>
        </div>
    </section>

    <footer id="contato" class="main-footer">
        <div class="footer-container">
            <div class="social-links">
                <a href="https://youtube.com/@imperatransito?si=CoPtFuyz0YoKyaoM" class="social-icon" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                <a href="https://www.tiktok.com/@jacislei_silva?is_from_webapp=1&sender_device=pc" class="social-icon" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
                <a href="https://kwai-video.com/u/@Jacislei/HgACYEEw" class="social-icon" aria-label="Kwai"><i class="fa-solid fa-play"></i></a>
                <a href="https://api.whatsapp.com/send?phone=5599982696900" class="social-icon" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p class="copyright">
                Desenvolvido por <strong>Jacislei Dev</strong> | Todos os direitos reservados &copy; 2026
            </p>
        </div>
    </footer>

    <!-- SCRIPT DE INTEGRAÇÃO DINÂMICA -->
    <script>
        // Ajuste esta URL com o endereço real onde os dados do seu blog estão expostos
        const API_URL = 'https://blog.imperatransito.com.br/materias.json'; 

        async function carregarMaterias() {
            const container = document.getElementById('blog-cards-container');
            
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Erro ao buscar posts');
                
                const materias = await response.json();
                
                // Limpa a mensagem de "Carregando..."
                container.innerHTML = '';
                
                // Renderiza cada matéria vinda do Blog usando exatamente o seu layout CSS
                materias.forEach(post => {
                    // Define a classe do badge dinamicamente dependendo do tipo de conteúdo
                    let badgeClass = 'badge';
                    if (post.tipo.toLowerCase() === 'vídeo aula') badgeClass = 'badge red';
                    if (post.tipo.toLowerCase() === 'simulado' || post.badge_amarelo) badgeClass = 'badge yellow';

                    const cardHTML = `
                        <a href="${post.link}" class="card" target="_blank">
                            <div class="card-image">
                                <img src="${post.imagem}" alt="${post.titulo}">
                                <span class="${badgeClass}">${post.tipo}</span>
                            </div>
                            <div class="card-info">
                                <h3>${post.titulo.toUpperCase()}</h3>
                                <p>${post.resumo}</p>
                                <span class="btn-card">${post.texto_botao || 'Ler Matéria'}</span>
                            </div>
                        </a>
                    `;
                    container.innerHTML += cardHTML;
                });

            } catch (error) {
                console.error('Erro na integração do blog:', error);
                container.innerHTML = `<p style="text-align: center; grid-column: 1/-1; color: #cc0000;">Não foi possível carregar as matérias recentes no momento.</p>`;
            }
        }

        // Executa a função ao carregar a página
        document.addEventListener('DOMContentLoaded', carregarMaterias);
    </script>
</body>
</html>
